<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head><link rel="manifest" href="manifest.json">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Rotina 💙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ══════════════════════════════════════
       TOKENS
    ══════════════════════════════════════ */
    :root {
      --bg:         #EAF4FD;
      --bg2:        #D9EDF9;
      --card:       #FFFFFF;
      --border:     #C2DFF4;
      --blue:       #5BB8DF;
      --blue-mid:   #3FA0CA;
      --blue-dark:  #2A7CA8;
      --blue-light: #DFF1FA;
      --mint:       #6DCFB8;
      --lavender:   #9EAED8;
      --peach:      #F0C4A0;
      --text:       #1A3A58;
      --muted:      #6A94B8;
      --shadow:     rgba(80,160,210,.14);
      --prog-bg:    #C2DFF4;
      --morning-c:  #5BB8DF;
      --afternoon-c:#7BACD4;
      --evening-c:  #9EAED8;
      --done-c:     #6DCFB8;
    }
    [data-theme="dark"] {
      --bg:         #0E2030;
      --bg2:        #142840;
      --card:       #1A3450;
      --border:     #254868;
      --blue:       #6CC8EF;
      --blue-mid:   #50B0DC;
      --blue-dark:  #88D4F5;
      --blue-light: #152E48;
      --mint:       #5EC4AD;
      --lavender:   #8EA0CC;
      --peach:      #D8AC88;
      --text:       #DDEEFF;
      --muted:      #7090B0;
      --shadow:     rgba(0,0,0,.40);
      --prog-bg:    #254868;
      --morning-c:  #6CC8EF;
      --afternoon-c:#7BACD4;
      --evening-c:  #9EAED8;
      --done-c:     #5EC4AD;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .35s, color .35s;
    }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    header {
      background: linear-gradient(135deg, #3FA0CA 0%, #9EAED8 100%);
      padding: 20px 20px 0;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 28px var(--shadow);
    }

    .header-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 6px;
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: 1.85rem; color: #fff;
      line-height: 1.1; letter-spacing: .02em;
    }
    .logo-sub {
      font-size:.72rem; color: rgba(255,255,255,.82);
      font-weight: 400; font-style: italic;
      margin-top: 4px; line-height: 1.45;
      max-width: 260px;
    }

    .dark-btn {
      background: rgba(255,255,255,.22);
      border: 1.5px solid rgba(255,255,255,.35);
      border-radius: 50px; padding: 7px 13px;
      cursor: pointer; font-size: 1.05rem;
      transition: background .2s, transform .15s;
      color: #fff;
    }
    .dark-btn:hover { background: rgba(255,255,255,.36); transform: scale(1.08); }

    .date-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.22);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 50px; padding: 5px 14px;
      font-size: .82rem; color: #fff; font-weight: 600;
      letter-spacing: .01em; margin: 10px 0 14px;
      text-transform: capitalize;
    }

    /* Progress strip */
    .prog-strip {
      background: var(--card);
      border-radius: 18px 18px 0 0;
      padding: 13px 18px 11px;
      display: flex; align-items: center; gap: 12px;
    }
    .prog-col { display:flex; flex-direction:column; flex:1; gap:4px; }
    .prog-label {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted);
    }
    .prog-track {
      flex:1; height: 9px; background: var(--prog-bg);
      border-radius: 50px; overflow:hidden;
    }
    .prog-fill {
      height:100%;
      background: linear-gradient(90deg, var(--blue), var(--mint));
      border-radius:50px; width:0%;
      transition: width .55s cubic-bezier(.4,0,.2,1);
    }
    .prog-pct {
      font-family: 'Fredoka One', cursive;
      font-size: 1.35rem; color: var(--blue-mid);
      min-width: 44px; text-align:right;
    }

    /* ══════════════════════════════════════
       MAIN
    ══════════════════════════════════════ */
    main {
      max-width: 480px; margin: 0 auto;
      padding: 0 14px 110px;
    }

    /* ══════════════════════════════════════
       MARK-ALL CARD
    ══════════════════════════════════════ */
    .mark-all-card {
      background: linear-gradient(135deg, var(--blue) 0%, var(--mint) 100%);
      border-radius: 20px; padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; margin: 18px 0 0;
      box-shadow: 0 6px 24px rgba(91,184,223,.28);
      transition: transform .2s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .mark-all-card:hover  { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(91,184,223,.38); }
    .mark-all-card:active { transform: scale(.97); }

    .big-chk {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,.25);
      border: 2.5px solid rgba(255,255,255,.6);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
    }
    .mark-all-card.all-done .big-chk {
      background: rgba(255,255,255,.9);
      border-color: #fff;
    }
    .big-chk-icon {
      color: var(--blue-mid); font-size: 16px; font-weight: 900;
      opacity: 0; transform: scale(0) rotate(-20deg);
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
    }
    .mark-all-card.all-done .big-chk-icon { opacity:1; transform: scale(1) rotate(0); }

    .mark-all-text { flex:1; }
    .mark-all-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem; color:#fff;
    }
    .mark-all-sub { font-size:.76rem; color:rgba(255,255,255,.82); font-weight:500; margin-top:2px; }
    .mark-all-emoji { font-size: 1.7rem; }

    /* ══════════════════════════════════════
       SECTION LABEL
    ══════════════════════════════════════ */
    .section-label {
      display: flex; align-items: center; gap: 8px;
      font-size: .73rem; font-weight: 700;
      letter-spacing: .13em; text-transform: uppercase;
      color: var(--muted); margin: 22px 2px 10px;
    }
    .s-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-c, var(--blue)); flex-shrink:0;
    }
    .section-label::after {
      content:''; flex:1; height:1px; background: var(--border);
    }

    /* ══════════════════════════════════════
       TASK CARD
    ══════════════════════════════════════ */
    .tasks { display:flex; flex-direction:column; gap:9px; }

    .task-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 13px 15px 13px 18px;
      display: flex; align-items: center; gap: 13px;
      cursor: pointer;
      box-shadow: 0 2px 16px var(--shadow);
      position: relative; overflow: hidden;
      transition: transform .2s, box-shadow .2s, opacity .35s, background .3s, border-color .3s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .task-card::before {
      content:'';
      position:absolute; left:0; top:0; bottom:0; width:4px;
      border-radius:18px 0 0 18px;
      background: var(--accent-c, var(--blue));
      transition: background .4s;
    }
    .task-card:hover  { transform:translateY(-1px); box-shadow:0 6px 24px var(--shadow); }
    .task-card:active { transform:scale(.98); }

    .task-card.done {
      opacity: .62; border-color: transparent;
      background: var(--blue-light);
    }
    .task-card.done::before { background: var(--done-c); }

    .task-card.skip-task { opacity:.38; pointer-events:none; }

    @keyframes pop {
      0%  { transform:scale(1); }
      45% { transform:scale(1.032); box-shadow:0 0 0 8px rgba(91,184,223,.14); }
      100%{ transform:scale(1); }
    }
    .task-card.popping { animation: pop .38s ease; }

    /* Checkbox */
    .chk {
      width:26px; height:26px; border-radius:50%;
      border:2px solid var(--border); flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      background:transparent;
      transition: background .3s, border-color .3s, transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .task-card.done .chk {
      background: var(--done-c); border-color: var(--done-c);
      transform: scale(1.1);
    }
    .chk-icon {
      color:#fff; font-size:13px; font-weight:700;
      opacity:0; transform:scale(0) rotate(-20deg);
      transition: opacity .25s, transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .task-card.done .chk-icon { opacity:1; transform:scale(1) rotate(0); }

    /* Text */
    .task-body { flex:1; min-width:0; }
    .task-time {
      font-size:.68rem; font-weight:700; letter-spacing:.04em;
      color: var(--accent-c, var(--blue)); margin-bottom:2px;
      transition: color .35s;
      white-space: nowrap;
    }
    .task-card.done .task-time { color: var(--done-c); }

    .task-name {
      font-size:.93rem; font-weight:600;
      color: var(--text); line-height:1.35;
      transition: color .3s;
    }
    .task-card.done .task-name { text-decoration:line-through; color:var(--muted); }

    .task-badge {
      display:inline-block; font-size:.67rem; font-weight:700;
      background: var(--blue-light); color: var(--blue-mid);
      border-radius:50px; padding:2px 8px; margin-top:5px;
    }
    [data-theme="dark"] .task-badge { background:var(--border); color:var(--blue-dark); }

    .task-emoji {
      font-size:1.3rem; flex-shrink:0;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .task-card.done .task-emoji { transform:scale(.88); }

    /* ══════════════════════════════════════
       COMPLETION OVERLAY
    ══════════════════════════════════════ */
    .overlay {
      position:fixed; inset:0; z-index:300;
      background: rgba(60,160,200,.2);
      backdrop-filter: blur(8px);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none;
      transition: opacity .45s;
    }
    .overlay.show { opacity:1; pointer-events:all; }

    .ov-card {
      background: var(--card);
      border-radius:28px; padding:42px 32px;
      text-align:center; max-width:320px; margin:20px;
      box-shadow:0 24px 64px rgba(40,100,160,.22);
      border:2px solid var(--border);
      transform:scale(.82) translateY(22px);
      transition:transform .5s cubic-bezier(.34,1.56,.64,1);
    }
    .overlay.show .ov-card { transform:scale(1) translateY(0); }

    .ov-stars { font-size:1.5rem; margin-bottom:8px; letter-spacing:.12em; }
    .ov-emoji {
      font-size:4rem; display:block; margin-bottom:14px;
      animation: float 2.2s ease-in-out infinite alternate;
    }
    @keyframes float { from { transform:translateY(0); } to { transform:translateY(-10px); } }
    .ov-title {
      font-family:'Fredoka One', cursive;
      font-size:2.1rem; color:var(--blue-mid); margin-bottom:8px;
    }
    .ov-sub {
      color:var(--muted); font-size:.9rem;
      line-height:1.65; margin-bottom:26px; font-weight:500;
    }
    .ov-btn {
      background: linear-gradient(135deg, var(--blue), var(--mint));
      color:#fff; border:none; border-radius:50px;
      padding:13px 32px;
      font-family:'Quicksand', sans-serif;
      font-size:.92rem; font-weight:700; cursor:pointer;
      box-shadow:0 4px 16px rgba(91,184,223,.35);
      transition: opacity .2s, transform .15s;
    }
    .ov-btn:hover  { opacity:.9; transform:scale(1.04); }
    .ov-btn:active { transform:scale(.97); }

    /* ══════════════════════════════════════
       RESET BTN
    ══════════════════════════════════════ */
    .reset-btn {
      position:fixed; bottom:24px; right:18px;
      background:var(--card); border:1.5px solid var(--border);
      border-radius:50px; padding:10px 18px;
      font-size:.79rem; color:var(--muted); cursor:pointer;
      font-family:'Quicksand', sans-serif; font-weight:600;
      box-shadow:0 4px 20px var(--shadow);
      transition: all .2s;
    }
    .reset-btn:hover { background:var(--blue-light); color:var(--blue-mid); }

    /* ══════════════════════════════════════
       CONFETTI
    ══════════════════════════════════════ */
    .confetti-box { position:fixed; inset:0; pointer-events:none; z-index:400; overflow:hidden; }
    .cp {
      position:absolute; opacity:0;
      animation: cffall 3.5s ease forwards;
    }
    @keyframes cffall {
      0%  { opacity:1; transform:translateY(-20px) rotate(0deg); }
      100%{ opacity:0; transform:translateY(105vh) rotate(800deg); }
    }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div>
      <div class="logo">💙 Minha Rotina</div>
      <div class="logo-sub">"Tudo o que fizerem, façam de todo o coração, como para o Senhor, e não para os homens." — Colossenses 3:23</div>
    </div>
    <button class="dark-btn" id="darkBtn">🌙</button>
  </div>
  <div class="date-pill" id="datePill">📅 …</div>
  <div class="prog-strip">
    <div class="prog-col">
      <div class="prog-label">Progresso do dia</div>
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    </div>
    <div class="prog-pct" id="progPct">0%</div>
  </div>
</header>

<!-- MAIN -->
<main><div id="taskRoot"></div></main>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="ov-card">
    <div class="ov-stars">⭐ ⭐ ⭐</div>
    <span class="ov-emoji">🎉</span>
    <div class="ov-title">Dia concluído!</div>
    <div class="ov-sub">
      Você arrasou hoje! 💙<br>
      Descanse com a consciência tranquila.<br>
      Amanhã é um novo dia incrível. 🌟
    </div>
    <button class="ov-btn" id="ovClose">Fechar 🎊</button>
  </div>
</div>

<div class="confetti-box" id="confettiBox"></div>
<button class="reset-btn" id="resetBtn">↺ Reiniciar dia</button>

<script>
(function () {

  /* ──── CONSTS ──────────────────────────────── */
  const DAYS_PT   = ['domingo','segunda-feira','terça-feira','quarta-feira',
                     'quinta-feira','sexta-feira','sábado'];
  const MONTHS_PT = ['janeiro','fevereiro','março','abril','maio','junho',
                     'julho','agosto','setembro','outubro','novembro','dezembro'];

  const now      = new Date();
  const dow      = now.getDay();   // 0=Dom … 6=Sáb
  const todayKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;

  /* Domestic task per weekday */
  const DOMESTIC = {
    0: { name:'Descanso — sem tarefas domésticas 🛀',         emoji:'💆‍♀️', skip:true  },
    1: { name:'Passar pano na casa',                          emoji:'🧹',   skip:false },
    2: { name:'Limpeza geral na cozinha',                      emoji:'🍳',   skip:false },
    3: { name:'Lavar roupas + organizar guarda-roupa',         emoji:'👗',   skip:false },
    4: { name:'Lavar banheiro',                                 emoji:'🧽',   skip:false },
    5: { name:'Tarefa leve + rotina simples',                   emoji:'🏠',   skip:false },
    6: { name:'Flexível — escolha sua tarefa!',                emoji:'🌸',   skip:false },
  };

  const DAY_LABELS = ['🌀 Dom','📅 Seg','📅 Ter','📅 Qua','📅 Qui','📅 Sex','📅 Sáb'];

  /* Study / hobby block per weekday */
  const STUDY = {
    0: { name:'Livre — sem estudo hoje',           emoji:'🌙', skip:true  },
    1: { name:'Inglês + Espanhol',                  emoji:'📚', skip:false },
    2: { name:'Inglês + Espanhol',                  emoji:'📚', skip:false },
    3: { name:'Inglês + Espanhol',                  emoji:'📚', skip:false },
    4: { name:'Inglês + Espanhol',                  emoji:'📚', skip:false },
    5: { name:'Hobby — tocar instrumento',          emoji:'🎸', skip:false },
    6: { name:'Livre — sem estudo hoje',           emoji:'🌙', skip:true  },
  };
  const s = STUDY[dow];

  const d            = DOMESTIC[dow];
  const isPremiumBath = (dow === 2 || dow === 5); // Terça & Sexta

  /* Full task list */
  const TASKS = [
    /* ── MANHÃ ─────────────────────────────── */
    { id:'wake',    time:'09:20',           name:'Acordar + vacuum',                 emoji:'🌅', sec:'manhã' },
    { id:'bfast',   time:'09:30',           name:'Café da manhã',                    emoji:'☕', sec:'manhã' },
    { id:'bible',   time:'09:45 – 10:00',   name:'Leitura / estudo bíblico',         emoji:'📖', sec:'manhã' },
    { id:'workout', time:'10:40 – 12:40',   name:'Treino',                           emoji:'💪', sec:'manhã', badge:'⏱ 2 horas' },
    {
      id:'bath', sec:'manhã',
      time:  isPremiumBath ? '12:40 – 13:40' : '12:40 – 13:00',
      name:  isPremiumBath ? 'Banho Premium — lavar cabelo, esfoliação, epilação' : 'Banho',
      emoji: isPremiumBath ? '🛁' : '🚿',
      badge: isPremiumBath ? '✨ Premium · 1h' : null,
    },
    /* ── TARDE ─────────────────────────────── */
    {
      id:'lunch', sec:'tarde',
      time:  isPremiumBath ? '13:40 – 14:20' : '13:00 – 13:40',
      name:'Almoço', emoji:'🍽️',
    },
    {
      id:'work', sec:'tarde',
      time:  isPremiumBath ? '14:20 – 17:30' : '13:40 – 17:30',
      name:'Trabalho — produção de conteúdo', emoji:'💼',
      badge: isPremiumBath ? '⏱ 3h10' : '⏱ 3h50',
    },
    {
      id:'domestic', time:'17:30', sec:'tarde',
      name:  d.skip
               ? 'Descanso — sem tarefas domésticas'
               : `Tarefa doméstica: ${d.name}`,
      emoji: d.emoji,
      skip:  d.skip,
      badge: !d.skip ? `${DAY_LABELS[dow]}` : null,
    },
    { id:'snack',   time:'18:00', name:'Lanche',                            emoji:'🍓', sec:'tarde'   },
    /* ── NOITE ─────────────────────────────── */
    { id:'light',   time:'18:40 – 21:30', name:'Trabalho leve',                     emoji:'📝', sec:'noite'   },
    { id:'dinner', time:'19:30 – 20:00', name:'Jantar', emoji:'🍽️', sec:'noite' },
    {
      id:'study', time:'20:00 – 21:00', sec:'noite',
      name:  s.name,
      emoji: s.emoji,
      skip:  s.skip,
      badge: !s.skip ? `${DAY_LABELS[dow]}` : null,
    },
    { id:'wind',    time:'21:30', name:'Desacelerar',                       emoji:'🧘‍♀️', sec:'noite'  },
    { id:'sleep',   time:'23:30', name:'Dormir',                            emoji:'😴', sec:'noite'   },
  ];

  const COUNTABLE = TASKS.filter(t => !t.skip);

  const ACCENT = { manhã:'var(--morning-c)', tarde:'var(--afternoon-c)', noite:'var(--evening-c)' };
  const SEC_META = {
    manhã: { label:'🌸 Manhã',  dot:'var(--morning-c)'   },
    tarde: { label:'☀️ Tarde',  dot:'var(--afternoon-c)' },
    noite: { label:'🌙 Noite',  dot:'var(--evening-c)'   },
  };

  /* ──── STATE ───────────────────────────────── */
  function loadState() {
    try { const r = localStorage.getItem('rotina_v2'); return r ? JSON.parse(r) : null; }
    catch { return null; }
  }
  function saveState() {
    try { localStorage.setItem('rotina_v2', JSON.stringify({ date:todayKey, checked })); }
    catch {}
  }

  let checked = {};
  const saved = loadState();
  if (saved && saved.date === todayKey) checked = saved.checked || {};

  /* ──── THEME ───────────────────────────────── */
  const html = document.documentElement;
  function isDark() { return html.getAttribute('data-theme') === 'dark'; }
  function setTheme(dark) {
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.getElementById('darkBtn').textContent = dark ? '☀️' : '🌙';
    try { localStorage.setItem('rotina_theme', dark ? 'dark' : 'light'); } catch {}
  }
  try { const t = localStorage.getItem('rotina_theme'); if (t) setTheme(t === 'dark'); } catch {}
  document.getElementById('darkBtn').addEventListener('click', () => setTheme(!isDark()));

  /* ──── DATE PILL ───────────────────────────── */
  document.getElementById('datePill').textContent =
    `📅 ${DAYS_PT[dow]}, ${now.getDate()} de ${MONTHS_PT[now.getMonth()]} de ${now.getFullYear()}`;

  /* ──── RENDER ──────────────────────────────── */
  const root = document.getElementById('taskRoot');

  function render() {
    root.innerHTML = '';

    /* Mark-all card */
    const allDone = COUNTABLE.every(t => checked[t.id]);
    const mac = document.createElement('div');
    mac.className = 'mark-all-card' + (allDone ? ' all-done' : '');
    mac.innerHTML = `
      <div class="big-chk"><span class="big-chk-icon">✓</span></div>
      <div class="mark-all-text">
        <div class="mark-all-title">Marcar dia completo</div>
        <div class="mark-all-sub">${allDone ? 'Incrível! Tudo concluído hoje 🎉' : 'Clique para marcar tudo de uma vez!'}</div>
      </div>
      <div class="mark-all-emoji">${allDone ? '🌟' : '✅'}</div>
    `;
    mac.addEventListener('click', toggleAll);
    root.appendChild(mac);

    /* Sections */
    ['manhã','tarde','noite'].forEach(sec => {
      const items = TASKS.filter(t => t.sec === sec);
      if (!items.length) return;

      const meta = SEC_META[sec];

      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.style.setProperty('--accent-c', meta.dot);
      lbl.innerHTML = `<span class="s-dot" style="background:${meta.dot}"></span>${meta.label}`;
      root.appendChild(lbl);

      const wrap = document.createElement('div');
      wrap.className = 'tasks';

      items.forEach(task => {
        const card = document.createElement('div');
        card.className = 'task-card'
          + (checked[task.id] ? ' done' : '')
          + (task.skip ? ' skip-task' : '');
        card.style.setProperty('--accent-c', ACCENT[sec]);
        card.dataset.id = task.id;

        card.innerHTML = `
          <div class="chk"><span class="chk-icon">✓</span></div>
          <div class="task-body">
            <div class="task-time">${task.time}</div>
            <div class="task-name">${task.name}</div>
            ${task.badge ? `<span class="task-badge">${task.badge}</span>` : ''}
          </div>
          <div class="task-emoji">${task.emoji}</div>
        `;

        if (!task.skip) {
          card.addEventListener('click', () => toggle(task.id, card));
        }
        wrap.appendChild(card);
      });
      root.appendChild(wrap);
    });

    updateProgress();
  }

  /* ──── TOGGLE single ───────────────────────── */
  function toggle(id, card) {
    checked[id] = !checked[id];
    card.classList.toggle('done', !!checked[id]);
    card.classList.add('popping');
    card.addEventListener('animationend', () => card.classList.remove('popping'), { once:true });
    saveState();
    updateMarkAll();
    updateProgress();
    if (isComplete()) setTimeout(celebrate, 500);
  }

  /* ──── TOGGLE all ──────────────────────────── */
  function toggleAll() {
    const allDone = COUNTABLE.every(t => checked[t.id]);
    COUNTABLE.forEach(t => { checked[t.id] = !allDone; });
    saveState();
    render();
    if (!allDone && isComplete()) setTimeout(celebrate, 500);
  }

  /* ──── UPDATE mark-all ─────────────────────── */
  function updateMarkAll() {
    const card = document.querySelector('.mark-all-card');
    if (!card) return;
    const allDone = COUNTABLE.every(t => checked[t.id]);
    card.classList.toggle('all-done', allDone);
    card.querySelector('.mark-all-sub').textContent =
      allDone ? 'Incrível! Tudo concluído hoje 🎉' : 'Clique para marcar tudo de uma vez!';
    card.querySelector('.mark-all-emoji').textContent = allDone ? '🌟' : '✅';
  }

  /* ──── PROGRESS ────────────────────────────── */
  function updateProgress() {
    const done = COUNTABLE.filter(t => checked[t.id]).length;
    const pct  = COUNTABLE.length ? Math.round(done / COUNTABLE.length * 100) : 0;
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progPct').textContent  = pct + '%';
  }

  function isComplete() { return COUNTABLE.every(t => checked[t.id]); }

  /* ──── CELEBRATE ───────────────────────────── */
  function celebrate() {
    document.getElementById('overlay').classList.add('show');
    launchConfetti();
  }
  document.getElementById('ovClose').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('show');
  });

  /* ──── CONFETTI ────────────────────────────── */
  function launchConfetti() {
    const box    = document.getElementById('confettiBox');
    const colors = ['#5BB8DF','#6DCFB8','#9EAED8','#F0C4A0','#B8E0F0','#FFE0A0','#B0D8F5','#FFDDE8'];
    box.innerHTML = '';
    for (let i = 0; i < 90; i++) {
      const p  = document.createElement('div');
      const sz = 6 + Math.random() * 8;
      p.className = 'cp';
      p.style.cssText = `
        left:${Math.random()*100}vw; top:-10px;
        width:${sz}px; height:${sz}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>.5 ? '50%' : '3px'};
        animation-delay:${Math.random()*1.6}s;
        animation-duration:${2.8+Math.random()*2}s;
      `;
      box.appendChild(p);
    }
    setTimeout(() => { box.innerHTML = ''; }, 6000);
  }

  /* ──── RESET ───────────────────────────────── */
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('Reiniciar o progresso de hoje?')) return;
    checked = {};
    saveState();
    document.getElementById('overlay').classList.remove('show');
    render();
  });

  /* ──── INIT ────────────────────────────────── */
  render();

})();
</script>
</body>
</html>
